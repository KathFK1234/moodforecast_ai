<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodForecast AI</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        .search-section {
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #5568d3;
        }

        .search-box button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin: 20px 0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
        }

        .weather-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .location-header {
            font-size: 18px;
            font-weight: 600;
            color: #1b5e8a;
            margin-bottom: 15px;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .weather-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .weather-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .weather-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .wellbeing-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .mood-score {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .score-left h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }

        .score-right {
            text-align: right;
        }

        .level-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }

        .level-high {
            background: #d4edda;
            color: #155724;
        }

        .level-medium {
            background: #fff3cd;
            color: #856404;
        }

        .level-low {
            background: #f8d7da;
            color: #721c24;
        }

        .level-verylow {
            background: #f5c6cb;
            color: #721c24;
        }

        .recommendations {
            margin-bottom: 20px;
        }

        .recommendations h4 {
            font-size: 14px;
            color: #1b5e8a;
            margin-bottom: 10px;
        }

        .recommendations ul {
            list-style: none;
        }

        .recommendations li {
            padding: 10px 0;
            padding-left: 20px;
            position: relative;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        .recommendations li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }

        .ai-summary {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        .subscribe-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .subscribe-section h3 {
            font-size: 16px;
            color: #1b5e8a;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .subscribe-button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .subscribe-button:hover {
            background: #5568d3;
        }

        .subscribe-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .subscribe-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 24px;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .mood-score {
                flex-direction: column;
                text-align: center;
            }

            .score-right {
                text-align: center;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ MoodForecast AI</h1>
            <p>Where environmental intelligence meets psychological wellbeing</p>
        </div>

        <div class="content">
            <!-- Search Section -->
            <div class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="locationInput" 
                        placeholder="Enter city name or coordinates..." 
                        value="Nairobi"
                    >
                    <button id="searchButton" onclick="handleSearch()">Search</button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading hidden">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Loading forecast...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error hidden"></div>

            <!-- Weather Card -->
            <div id="weatherCard" class="weather-card hidden">
                <div class="location-header" id="locationName">Nairobi, KE</div>
                <div class="weather-grid">
                    <div class="weather-item">
                        <div class="weather-label">Temperature</div>
                        <div class="weather-value" id="tempValue">18°C</div>
                    </div>
                    <div class="weather-item">
                        <div class="weather-label">Humidity</div>
                        <div class="weather-value" id="humidityValue">74%</div>
                    </div>
                    <div class="weather-item">
                        <div class="weather-label">Condition</div>
                        <div class="weather-value" id="conditionValue" style="font-size: 18px;">Cloudy</div>
                    </div>
                    <div class="weather-item">
                        <div class="weather-label">Wind</div>
                        <div class="weather-value" id="windValue" style="font-size: 18px;">12 kph</div>
                    </div>
                </div>
            </div>

            <!-- Wellbeing Section -->
            <div id="wellbeingSection" class="wellbeing-section hidden">
                <div class="mood-score">
                    <div class="score-left">
                        <h3>Mood Score</h3>
                        <div class="score-value" id="moodScore">65</div>
                    </div>
                    <div class="score-right">
                        <div>
                            <span class="level-badge level-medium" id="energyBadge">Medium Energy</span>
                            <span class="level-badge level-low" id="riskBadge">Low Risk</span>
                        </div>
                    </div>
                </div>

                <div id="aiSummaryDiv" class="ai-summary hidden"></div>

                <div class="recommendations">
                    <h4>Wellbeing Recommendations</h4>
                    <ul id="recommendationsList"></ul>
                </div>
            </div>

            <!-- Subscribe Section -->
            <div id="subscribeSection" class="subscribe-section hidden">
                <h3>📱 Subscribe to Daily Alerts</h3>
                <form onsubmit="handleSubscribe(event)">
                    <div class="form-group">
                        <label>Phone Number (E.164)</label>
                        <input 
                            type="tel" 
                            id="phoneInput" 
                            placeholder="+254712345678" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input 
                            type="text" 
                            id="cropLocationInput" 
                            placeholder="Your location" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label>Crop (Optional)</label>
                        <input 
                            type="text" 
                            id="cropInput" 
                            placeholder="e.g., Maize, Tea, Wheat"
                        >
                    </div>
                    <div class="form-group">
                        <label>Language</label>
                        <select id="languageSelect">
                            <option value="en">English</option>
                            <option value="sw">Swahili</option>
                        </select>
                    </div>
                    <button type="submit" class="subscribe-button" id="subscribeBtn">Subscribe</button>
                    <div id="subscribeMessage"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';  // Use same domain as frontend

        async function handleSearch() {
            const location = document.getElementById('locationInput').value.trim();
            if (!location) {
                showError('Please enter a location');
                return;
            }

            showLoading(true);
            hideError();
            hideWellbeing();

            try {
                // Fetch forecast
                const forecastRes = await fetch(`${API_BASE}/api/forecast/${encodeURIComponent(location)}`);
                if (!forecastRes.ok) throw new Error('Location not found or API error');
                const forecastData = await forecastRes.json();

                // Fetch wellbeing
                const wellbeingRes = await fetch(`${API_BASE}/api/wellbeing/${encodeURIComponent(location)}`);
                if (!wellbeingRes.ok) throw new Error('Unable to calculate wellbeing');
                const wellbeingData = await wellbeingRes.json();

                // Display weather
                displayWeather(forecastData);

                // Display wellbeing
                displayWellbeing(wellbeingData);

                // Show subscribe form and populate location
                document.getElementById('cropLocationInput').value = wellbeingData.location;
                document.getElementById('subscribeSection').classList.remove('hidden');

            } catch (error) {
                showError(error.message || 'Failed to fetch data. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function displayWeather(data) {
            document.getElementById('locationName').textContent = data.location;
            document.getElementById('tempValue').textContent = data.weather.temp_c + '°C';
            document.getElementById('humidityValue').textContent = data.weather.humidity + '%';
            document.getElementById('conditionValue').textContent = data.weather.condition;
            document.getElementById('windValue').textContent = data.weather.wind_kph + ' kph';
            document.getElementById('weatherCard').classList.remove('hidden');
        }

        function displayWellbeing(data) {
            document.getElementById('moodScore').textContent = data.mood_score;

            // Energy level badge
            const energyClass = {
                'High': 'level-high',
                'Medium': 'level-medium',
                'Low': 'level-low',
                'Very Low': 'level-verylow'
            }[data.energy_level] || 'level-medium';
            document.getElementById('energyBadge').className = `level-badge ${energyClass}`;
            document.getElementById('energyBadge').textContent = data.energy_level + ' Energy';

            // Risk level badge
            const riskClass = {
                'Minimal': 'level-high',
                'Low': 'level-medium',
                'Moderate': 'level-low',
                'High': 'level-verylow'
            }[data.risk_level] || 'level-medium';
            document.getElementById('riskBadge').className = `level-badge ${riskClass}`;
            document.getElementById('riskBadge').textContent = data.risk_level + ' Risk';

            // AI summary
            if (data.ai_summary) {
                document.getElementById('aiSummaryDiv').textContent = data.ai_summary;
                document.getElementById('aiSummaryDiv').classList.remove('hidden');
            } else {
                document.getElementById('aiSummaryDiv').classList.add('hidden');
            }

            // Recommendations
            const recList = document.getElementById('recommendationsList');
            recList.innerHTML = '';
            data.recommendations.forEach(rec => {
                const li = document.createElement('li');
                li.textContent = rec;
                recList.appendChild(li);
            });

            document.getElementById('wellbeingSection').classList.remove('hidden');
        }

        async function handleSubscribe(event) {
            event.preventDefault();

            const phone = document.getElementById('phoneInput').value.trim();
            const location = document.getElementById('cropLocationInput').value.trim();
            const crop = document.getElementById('cropInput').value.trim() || null;
            const language = document.getElementById('languageSelect').value;

            if (!phone || !location) {
                alert('Please fill in required fields');
                return;
            }

            const btn = document.getElementById('subscribeBtn');
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, location, crop, language })
                });

                if (!res.ok) throw new Error('Subscription failed');

                const data = await res.json();
                const msg = document.getElementById('subscribeMessage');
                msg.className = 'subscribe-success';
                msg.textContent = `✓ Subscribed! Subscriber ID: ${data.subscriber_id}`;
            } catch (error) {
                const msg = document.getElementById('subscribeMessage');
                msg.className = 'error';
                msg.textContent = error.message;
            } finally {
                btn.disabled = false;
            }
        }

        function showLoading(show) {
            document.getElementById('loadingState').classList.toggle('hidden', !show);
        }

        function hideError() {
            document.getElementById('errorState').classList.add('hidden');
        }

        function showError(message) {
            const el = document.getElementById('errorState');
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function hideWellbeing() {
            document.getElementById('weatherCard').classList.add('hidden');
            document.getElementById('wellbeingSection').classList.add('hidden');
            document.getElementById('subscribeSection').classList.add('hidden');
        }

        // Allow Enter key to search
        document.getElementById('locationInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSearch();
        });

        // Auto-load on page load
        window.addEventListener('load', function() {
            handleSearch();
        });
    </script>
</body>
</html>
